version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: forge_user
      POSTGRES_PASSWORD: forge_password
      POSTGRES_DB: streakforge
    volumes:
      - streakforge_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      # Use PostgreSQL database URL instead of SQLite
      - DATABASE_URL=postgresql://forge_user:forge_password@db:5432/streakforge
      - SECRET_KEY=your-secure-random-secret-key-here
      - CORS_ORIGINS=["*"] # Restrict this in true production (e.g., '["https://yourdomain.com"]')
      - GEMINI_API_KEY=${GEMINI_API_KEY:-} # Pass from host if available
    depends_on:
      - db

volumes:
  streakforge_data:
