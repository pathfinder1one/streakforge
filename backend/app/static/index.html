    <script>
      try {
        const item = localStorage.getItem('streakforge-theme');
        if (item) {
          const parsed = JSON.parse(item);
          if (parsed?.state?.theme === 'light') {
            document.documentElement.classList.remove('dark');
          } else {

          }
